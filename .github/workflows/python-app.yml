# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Launch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        sudo apt-get install -y xvfb libgl1-mesa-dri
        sudo apt-get install -y libgl1-mesa-glx libgl1-mesa-dri libx11-6 libxext6 libxxf86vm1 libxrender1 libxtst6
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Minecraft
      run: |
        export DISPLAY=:99
        Xvfb :99 -screen 0 1920x1080x24 +extension GLX +render -noreset > /dev/null 2>&1 &
        sleep 3  # даём xvfb запуститься
        xvfb-run -a python3 launch.py   # или просто python3 launch.py, если DISPLAY уже экспортирован
